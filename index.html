<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Descubra seu tipo</title>

<style>

body{
background:linear-gradient(135deg,#1e0033,#330066,#6600cc);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

button{
padding:20px 40px;
font-size:25px;
border:none;
border-radius:40px;
background:#ff0088;
color:white;
cursor:pointer;
}

#resultado{
display:none;
font-size:60px;
}

</style>
</head>

<body>

<div id="inicio">

<h1>DESCUBRA SEU TIPO</h1>

<button onclick="mostrar()">CLIQUE AQUI</button>

</div>

<div id="resultado">

<h1>VOCÊ É GAY</h1>

</div>

<script>

function mostrar(){

document.getElementById("inicio").style.display="none";

document.getElementById("resultado").style.display="block";

}

</script>

</body>

</html>
